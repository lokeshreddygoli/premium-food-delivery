<!DOCTYPE html>
<html>
<head>
<title>Login | Premium Food Delivery</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-layout">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-badge">🍽️</div>
      <div>
        <h2>Premium Food Delivery</h2>
        <p class="small">Lightning-fast gourmet delivery experience</p>
      </div>
    </div>

    <h3>Welcome back</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <p class="small" style="margin-top:14px;">New user? <a href="register.html">Create account</a></p>
  </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
