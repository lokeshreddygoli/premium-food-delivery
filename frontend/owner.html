<!DOCTYPE html>
<html>
<head>
<title>Owner Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>Owner Control Center</h1>
      <p class="small">Manage menu, monitor orders, and watch fraud signals in real time.</p>
    </div>
    <button style="max-width:140px;" onclick="logout()">Logout</button>
  </div>

  <div class="kpi-grid" id="ownerStats"></div>

  <div class="glass">
    <h2>Add New Food Item</h2>
    <div class="toolbar" style="grid-template-columns: 1fr 1fr;">
      <input id="name" placeholder="Food Name">
      <input id="price" placeholder="Price">
    </div>
    <input id="restaurant" placeholder="Restaurant Name">
    <button onclick="addFood()">Add Food</button>
  </div>

  <div class="glass">
    <h2>Food Items</h2>
    <div id="foodList" class="grid"></div>
  </div>

  <div class="glass">
    <h2>Orders</h2>
    <div id="orders" class="grid"></div>
  </div>

  <div class="glass">
    <h2>Fraud Detection</h2>
    <div id="fraud" class="grid"></div>
  </div>
</div>
<script src="js/owner.js"></script>
</body>
</html>
